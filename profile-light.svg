<svg width="900" height="511" viewBox="0 0 900 511" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;display=swap');
      
      * { font-family: 'JetBrains Mono', monospace; }
      
      .prompt { fill: #00B894; font-weight: 600; font-size: 13px; }
      .cmd { fill: #009FE3; font-weight: 600; font-size: 13px; }
      .output { fill: #111827; font-weight: 400; font-size: 13px; }
      .muted { fill: #64748B; font-size: 11px; }
      .accent-purple { fill: #7C3AED; font-weight: 600; font-size: 13px; }
      .accent-cyan { fill: #009FE3; font-weight: 600; font-size: 13px; }
    </style>
    
    <pattern id="grid-pattern" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="#009FE3" stroke-width="1" opacity="0.04"/>
    </pattern>
    <pattern id="scanline" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 4 0" stroke="rgba(0,0,0,0.015)" stroke-width="2"/>
    </pattern>
    
    <linearGradient id="laser-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0, 159, 227, 0)"/>
      <stop offset="20%" stop-color="rgba(0, 159, 227, 0.1)"/>
      <stop offset="50%" stop-color="rgba(0, 159, 227, 0.4)"/>
      <stop offset="80%" stop-color="rgba(0, 159, 227, 0.1)"/>
      <stop offset="100%" stop-color="rgba(0, 159, 227, 0)"/>
    </linearGradient>

    <!-- Softer shadows for light mode -->
    <filter id="soft-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Outer Window Background -->
  <rect x="0" y="0" width="900" height="511" fill="#F5F7FA" rx="10" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
  <rect x="0" y="0" width="900" height="511" fill="url(#scanline)" rx="10" pointer-events="none"/>

  <!-- ==================== STARTUP SEQUENCE ==================== -->
  <g id="startup-sequence">
    <animate attributeName="opacity" values="1;0" begin="8.0s" dur="0.5s" fill="freeze" />
    
    <!-- Solid Background to hide dashboard underneath -->
    <rect x="0" y="0" width="900" height="511" fill="#F5F7FA" rx="10"/>
    <rect x="0" y="0" width="900" height="511" fill="url(#scanline)" rx="10" opacity="0.15"/>
    
    <!-- Blinking Cursor -->
    <rect x="40" y="40" width="10" height="18" fill="#009FE3">
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
    </rect>

    <g transform="translate(40, 52)" font-family="'JetBrains Mono', monospace" font-size="14" fill="#475569">
      
      <!-- Stage 1: Initializing -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" begin="0.2s" dur="0.1s" fill="freeze"/>
        <text>Initializing Developer Environment...</text>
      </g>

      <!-- Stage 2: GitHub Connection -->
      <g opacity="0" transform="translate(0, 30)">
        <animate attributeName="opacity" values="0;1" begin="1.0s" dur="0.1s" fill="freeze"/>
        <text>Connecting to github.com...</text>
        <rect x="0" y="15" width="200" height="4" fill="#E2E8F0" rx="2" />
        <rect x="0" y="15" width="0" height="4" fill="#009FE3" rx="2">
          <animate attributeName="width" values="0;200" begin="1.2s" dur="0.4s" fill="freeze" />
        </rect>
        <text x="210" y="21" font-size="12" fill="#00B894" opacity="0">
          <animate attributeName="opacity" values="0;1" begin="1.6s" dur="0.1s" fill="freeze"/>
          ✓ Connection Established
        </text>
      </g>

      <!-- Stage 3: Profile Retrieval -->
      <g opacity="0" transform="translate(0, 75)">
        <animate attributeName="opacity" values="0;1" begin="1.8s" dur="0.1s" fill="freeze"/>
        <text>Retrieving public profile...</text>
        <rect x="0" y="15" width="200" height="4" fill="#E2E8F0" rx="2" />
        <rect x="0" y="15" width="0" height="4" fill="#009FE3" rx="2">
          <animate attributeName="width" values="0;200" begin="2.0s" dur="0.4s" fill="freeze" />
        </rect>
        <text x="210" y="21" font-size="12" fill="#00B894" opacity="0">
          <animate attributeName="opacity" values="0;1" begin="2.4s" dur="0.1s" fill="freeze"/>
          ✓ Profile Loaded
        </text>
      </g>

      <!-- Stage 4: Repository Scan -->
      <g opacity="0" transform="translate(0, 120)">
        <animate attributeName="opacity" values="0;1" begin="2.6s" dur="0.1s" fill="freeze"/>
        <text>Scanning tech stack...</text>
        
        <g font-size="12" fill="#475569">
          <g opacity="0" transform="translate(0, 20)"><animate attributeName="opacity" values="0;1" begin="2.8s" dur="0.1s" fill="freeze"/><text fill="#00B894">✓</text><text x="15">React</text></g>
          <g opacity="0" transform="translate(80, 20)"><animate attributeName="opacity" values="0;1" begin="2.9s" dur="0.1s" fill="freeze"/><text fill="#00B894">✓</text><text x="15">TypeScript</text></g>
          <g opacity="0" transform="translate(190, 20)"><animate attributeName="opacity" values="0;1" begin="3.0s" dur="0.1s" fill="freeze"/><text fill="#00B894">✓</text><text x="15">Flutter</text></g>
          <g opacity="0" transform="translate(280, 20)"><animate attributeName="opacity" values="0;1" begin="3.1s" dur="0.1s" fill="freeze"/><text fill="#00B894">✓</text><text x="15">Node.js</text></g>
          <g opacity="0" transform="translate(370, 20)"><animate attributeName="opacity" values="0;1" begin="3.2s" dur="0.1s" fill="freeze"/><text fill="#00B894">✓</text><text x="15">PostgreSQL</text></g>
          <g opacity="0" transform="translate(480, 20)"><animate attributeName="opacity" values="0;1" begin="3.3s" dur="0.1s" fill="freeze"/><text fill="#00B894">✓</text><text x="15">Docker</text></g>
        </g>
      </g>

      <!-- Stage 5: Contribution Analysis -->
      <g opacity="0" transform="translate(0, 175)">
        <animate attributeName="opacity" values="0;1" begin="3.5s" dur="0.1s" fill="freeze"/>
        <text>Analyzing contribution history...</text>
        <rect x="0" y="15" width="200" height="4" fill="#E2E8F0" rx="2" />
        <rect x="0" y="15" width="0" height="4" fill="#009FE3" rx="2">
          <animate attributeName="width" values="0;200" begin="3.7s" dur="0.4s" fill="freeze" />
        </rect>
        <text x="210" y="21" font-size="12" fill="#00B894" opacity="0">
          <animate attributeName="opacity" values="0;1" begin="4.1s" dur="0.1s" fill="freeze"/>
          ✓ Activity Verified
        </text>
      </g>

      <!-- Stage 6: Identity Scan -->
      <g opacity="0" transform="translate(0, 240)">
        <animate attributeName="opacity" values="0;1" begin="4.3s" dur="0.1s" fill="freeze"/>
        
        <g transform="translate(20, 20)">
          <circle cx="20" cy="20" r="18" fill="none" stroke="#009FE3" stroke-width="2" stroke-dasharray="4 4">
            <animateTransform attributeName="transform" type="rotate" values="0 20 20; 360 20 20" dur="4s" repeatCount="indefinite"/>
          </circle>
          <circle cx="20" cy="20" r="12" fill="none" stroke="#00B894" stroke-width="1.5">
             <animate attributeName="r" values="12;14;12" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="20" cy="20" r="4" fill="#00B894" />
        </g>
        
        <g transform="translate(80, 35)">
          <text font-size="13" fill="#009FE3">Scanning biometric identity...</text>
          <rect x="0" y="10" width="150" height="4" fill="#E2E8F0" rx="2" />
          <rect x="0" y="10" width="0" height="4" fill="#009FE3" rx="2">
            <animate attributeName="width" values="0;150" begin="4.5s" dur="0.8s" fill="freeze" />
          </rect>
          
          <g opacity="0" transform="translate(0, 35)">
            <animate attributeName="opacity" values="0;1" begin="5.4s" dur="0.1s" fill="freeze"/>
            <text font-size="14" font-weight="bold" fill="#00B894">IDENTITY MATCH CONFIRMED</text>
            <text y="20" font-size="13" fill="#475569">User: Mohamed Ashfaq</text>
            <text y="40" font-size="13" fill="#475569">Confidence: <tspan fill="#009FE3">99.98%</tspan></text>
            <text y="60" font-size="13" fill="#475569">Status: <tspan fill="#00B894">VERIFIED ACCESS</tspan></text>
          </g>
        </g>
      </g>
      
      <!-- Stage 7: Access Granted -->
      <g opacity="0" transform="translate(0, 410)">
        <animate attributeName="opacity" values="0;1" begin="6.0s" dur="0.1s" fill="freeze"/>
        <text font-size="16" font-weight="bold" fill="#00B894">ACCESS GRANTED</text>
        <text y="24" fill="#475569">Launching Developer Workspace...</text>
      </g>

    </g>
  </g>

  <!-- ==================== DASHBOARD ==================== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="8.5s" dur="0.5s" fill="freeze"/>

    <!-- Global Top Title Bar -->
    <path d="M 0 10 Q 0 0 10 0 L 890 0 Q 900 0 900 10 L 900 36 L 0 36 Z" fill="#FFFFFF"/>
    <line x1="0" y1="36" x2="900" y2="36" stroke="#D1D5DB" stroke-width="1"/>
  
    <!-- Traffic Lights -->
    <circle cx="19.5" cy="18" r="5.5" fill="#FF5F57"/>
    <circle cx="36.5" cy="18" r="5.5" fill="#FEBC2E"/>
    <circle cx="53.5" cy="18" r="5.5" fill="#28C840"/>

    <text x="450" y="22" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="0.4">ashfaqdev ~ % profile.sh --live</text>
  
    <g transform="translate(835, 12)">
      <circle cx="5" cy="5" r="2.5" fill="#00B894">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="14" y="9" fill="#00B894" font-family="'JetBrains Mono', monospace" font-size="10">active</text>
    </g>

    <!-- Left Panel: MatrixAvatar -->
    <g transform="translate(0, 36)">
      <rect width="240" height="475" fill="#F5F7FA"/>
      <line x1="240" y1="0" x2="240" y2="475" stroke="#CBD5E1" stroke-width="1"/>
    
      <rect width="240" height="475" fill="url(#grid-pattern)"/>
    
      <text x="120" y="22" fill="#64748B" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle" letter-spacing="1.5">VISUAL.REC</text>
      <text x="120" y="465" fill="#64748B" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle" letter-spacing="1">ID: 0x4D41</text>
    
      <!-- HUD Target Bracket Corners -->
      <path d="M 32 35 L 20 35 L 20 47" fill="none" stroke="#009FE3" stroke-width="1.5"/>
      <path d="M 208 35 L 220 35 L 220 47" fill="none" stroke="#009FE3" stroke-width="1.5"/>
      <path d="M 32 440 L 20 440 L 20 428" fill="none" stroke="#009FE3" stroke-width="1.5"/>
      <path d="M 208 440 L 220 440 L 220 428" fill="none" stroke="#009FE3" stroke-width="1.5"/>

      <!-- Telemetry -->
      <text x="26" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8">
        <animate attributeName="opacity" values="1;0;0;0;0" calcMode="discrete" dur="5s" repeatCount="indefinite"/>
        SYS.SCAN: OK
      </text>
      <text x="26" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8">
        <animate attributeName="opacity" values="0;1;0;0;0" calcMode="discrete" dur="5s" repeatCount="indefinite"/>
        SYS.SCAN: SECURE
      </text>
      <text x="26" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8">
        <animate attributeName="opacity" values="0;0;1;0;0" calcMode="discrete" dur="5s" repeatCount="indefinite"/>
        SYS.SCAN: VERIFIED
      </text>
      <text x="26" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8">
        <animate attributeName="opacity" values="0;0;0;1;0" calcMode="discrete" dur="5s" repeatCount="indefinite"/>
        SYS.SCAN: SCANNING
      </text>
      <text x="26" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8">
        <animate attributeName="opacity" values="0;0;0;0;1" calcMode="discrete" dur="5s" repeatCount="indefinite"/>
        SYS.SCAN: ALPHA_CLR
      </text>
      <text x="214" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">
        <animate attributeName="opacity" values="1;0;0;0;0;0;0;0" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
        SWEEP: 04%
      </text>
      <text x="214" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">
        <animate attributeName="opacity" values="0;1;0;0;0;0;0;0" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
        SWEEP: 24%
      </text>
      <text x="214" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">
        <animate attributeName="opacity" values="0;0;1;0;0;0;0;0" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
        SWEEP: 68%
      </text>
      <text x="214" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">
        <animate attributeName="opacity" values="0;0;0;1;0;0;0;0" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
        SWEEP: 96%
      </text>
      <text x="214" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">
        <animate attributeName="opacity" values="0;0;0;0;1;0;0;0" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
        SWEEP: 98%
      </text>
      <text x="214" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">
        <animate attributeName="opacity" values="0;0;0;0;0;1;0;0" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
        SWEEP: 72%
      </text>
      <text x="214" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">
        <animate attributeName="opacity" values="0;0;0;0;0;0;1;0" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
        SWEEP: 36%
      </text>
      <text x="214" y="57" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">
        <animate attributeName="opacity" values="0;0;0;0;0;0;0;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
        SWEEP: 11%
      </text>

      <text x="26" y="421" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8">TARGET: M.ASHFAQ</text>
      <text x="214" y="421" fill="#475569" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">MATCH: 99.98%</text>

      <!-- Avatar Vector Paths -->
      <g transform="translate(5, 5)">
        <!-- Outer Shape -->
        <g stroke="#00B894" stroke-linecap="round" fill="none">
          <animateTransform attributeName="transform" type="scale" values="1;1.015;1" dur="4s" repeatCount="indefinite" transform-origin="115 227"/>
          <circle cx="115" cy="140" r="38" stroke-width="8"/>
          <!-- Torso arc -->
          <path d="M 43 234 A 85 85 0 0 1 187 234" stroke-width="8"/>
        </g>
      
        <!-- Inner Details -->
        <g stroke="#009FE3" stroke-linecap="round" fill="none">
          <animateTransform attributeName="transform" type="scale" values="1;1.015;1" dur="4s" repeatCount="indefinite" transform-origin="115 227"/>
          <circle cx="115" cy="140" r="28" stroke-width="3"/>
          <!-- Inner Torso arc -->
          <path d="M 60 245 A 65 65 0 0 1 170 245" stroke-width="3"/>
        </g>
      </g>
    </g>

    <!-- Right Panel: TerminalInfo -->
    <g transform="translate(240, 36)">
      <!-- Content -->
      <g transform="translate(20, 20)">
        <!-- L1 -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;1" dur="0.1s" begin="8.7s" fill="freeze" />
          <text y="0"><tspan class="prompt">ashfaq@dev:~$</tspan> <tspan class="cmd">whoami</tspan></text>
          <text y="20" class="output">Mohamed Ashfaq</text>
        </g>
      
        <!-- L2 -->
        <g opacity="0" transform="translate(0, 48)">
          <animate attributeName="opacity" values="0;1" dur="0.1s" begin="8.9s" fill="freeze" />
          <text y="0"><tspan class="prompt">ashfaq@dev:~$</tspan> <tspan class="cmd">education</tspan></text>
          <text y="20" class="output">B.Tech Cybersecurity</text>
        </g>
      
        <!-- L3 -->
        <g opacity="0" transform="translate(0, 96)">
          <animate attributeName="opacity" values="0;1" dur="0.1s" begin="9.1s" fill="freeze" />
          <text y="0"><tspan class="prompt">ashfaq@dev:~$</tspan> <tspan class="cmd">focus</tspan></text>
          <text y="20" class="output">AI • Cybersecurity • SaaS</text>
        </g>
      
        <!-- L4 -->
        <g opacity="0" transform="translate(0, 144)">
          <animate attributeName="opacity" values="0;1" dur="0.1s" begin="9.3s" fill="freeze" />
          <text y="0"><tspan class="prompt">ashfaq@dev:~$</tspan> <tspan class="cmd">skills</tspan></text>
          <text y="24" class="accent-purple">Frontend</text> <text x="130" y="24" class="output">React • Next.js • Flutter • TypeScript</text>
          <text y="44" class="accent-purple">Backend</text>  <text x="130" y="44" class="output">Node.js • Express.js • PHP • REST APIs</text>
          <text y="64" class="accent-purple">Database</text> <text x="130" y="64" class="output">PostgreSQL • MySQL • Supabase</text>
          <text y="84" class="accent-purple">Cybersecurity</text> <text x="130" y="84" class="output">Linux • JWT • RBAC • Secure APIs</text>
          <text y="104" class="accent-purple">DevOps</text> <text x="130" y="104" class="output">Docker • Git • GitHub • Vercel • Railway</text>
        </g>

        <!-- L5 -->
        <g opacity="0" transform="translate(0, 268)">
          <animate attributeName="opacity" values="0;1" dur="0.1s" begin="9.5s" fill="freeze" />
          <text y="0"><tspan class="prompt">ashfaq@dev:~$</tspan> <tspan class="cmd">contact</tspan></text>
          <text y="24" class="accent-purple">GitHub</text> <text x="130" y="24" class="output">@mdashfaqq</text>
          <text y="44" class="accent-purple">LinkedIn</text>  <text x="130" y="44" class="output">/in/mohamedashfaq</text>
          <text y="64" class="accent-purple">Portfolio</text> <text x="130" y="64" class="output">https://mdashfaq-portfolio.vercel.app</text>
        </g>

        <!-- L6 -->
        <g opacity="0" transform="translate(0, 352)">
          <animate attributeName="opacity" values="0;1" dur="0.1s" begin="9.7s" fill="freeze" />
          <text y="0"><tspan class="prompt">ashfaq@dev:~$</tspan> <tspan class="cmd">status</tspan></text>
          <text y="20" class="output">● Open for collaboration</text>
        </g>

        <!-- Bottom Prompt -->
        <g transform="translate(0, 400)" opacity="0">
          <animate attributeName="opacity" values="0;1" dur="0.1s" begin="9.9s" fill="freeze" />
          <text y="0"><tspan class="prompt">ashfaq@dev:~$</tspan></text>
          <rect x="126" y="-11" width="8" height="14" fill="#009FE3">
            <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
          </rect>
        </g>
      </g>
    </g>

    <!-- Laser Sweep Overlay (animates over entire layout) -->
    <g pointer-events="none">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 511; 0 0" begin="8.5s" dur="8s" repeatCount="indefinite"/>
      <rect x="0" y="0" width="900" height="2" fill="url(#laser-grad)" opacity="0.4"/>
    </g>
  </g>
</svg>
