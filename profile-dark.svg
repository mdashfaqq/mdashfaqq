  <text x="260" y="386" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#00FFCC">● Available for Collaboration</text>

  <!-- Interactive Shell prompt line -->
  <g transform="translate(260, 406)">
    <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#22c55e">❯</text>
