    <circle cx="120" cy="195" r="28" stroke="#00D4FF" stroke-width="3" stroke-linecap="round" fill="none" style="filter: drop-shadow(0px 0px 6px rgba(0, 212, 255, 0.5));"/>
    
    <!-- Torso with shoulder detail -->
    <path d="M 50,285 A 85,85 0 0,1 190,285" stroke="#00FFCC" stroke-width="8" stroke-linecap="round" fill="none" style="filter: drop-shadow(0px 0px 10px rgba(0, 255, 204, 0.7));"/>
    <path d="M 70,285 A 65,65 0 0,1 170,285" stroke="#00D4FF" stroke-width="3" stroke-linecap="round" fill="none" style="filter: drop-shadow(0px 0px 6px rgba(0, 212, 255, 0.5));"/>
  </g>

  <!-- Right Column Content Layout -->
  <!-- Top bar info -->
  <g transform="translate(260, 48)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="10" fill="#475569" letter-spacing="0.12em">mdashfaqq</text>
    <text x="65" y="12" font-family="'JetBrains Mono', monospace" font-size="10" fill="#1e293b">~</text>
    <text x="77" y="12" font-family="'JetBrains Mono', monospace" font-size="10" fill="#475569">%</text>
    <text x="90" y="12" font-family="'JetBrains Mono', monospace" font-size="10" fill="#475569">profile.sh</text>
    <text x="160" y="12" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00D4FF" fill-opacity="0.6">--live</text>
    
    <text x="620" y="11" font-family="'JetBrains Mono', monospace" font-size="9" fill="#1e293b" text-anchor="end" letter-spacing="0.08em">KERNEL 2.0.26</text>
    <text x="620" y="11" font-family="'JetBrains Mono', monospace" font-size="9" fill="#22c55e" letter-spacing="0.08em"> ● ONLINE</text>
