  <text x="120" y="490" font-family="'JetBrains Mono', monospace" font-size="9" fill="rgba(0, 212, 255, 0.3)" text-anchor="middle" letter-spacing="0.12em">ID: 0x4D41</text>

  <!-- Target Bracket Corners -->
  <g stroke="rgba(0, 212, 255, 0.5)" stroke-width="1.5" fill="none">
    <path d="M 32,75 L 20,75 L 20,87" />
    <path d="M 208,75 L 220,75 L 220,87" />
    <path d="M 32,450 L 20,450 L 20,438" />
