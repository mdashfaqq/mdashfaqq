    <line x1="300" y1="123" x2="730" y2="123" />
    <line x1="310" y1="137" x2="700" y2="137" />
    <line x1="320" y1="151" x2="640" y2="151" />
    <line x1="345" y1="165" x2="630" y2="165" />
    
    <line x1="385" y1="183" x2="820" y2="183" />
    <line x1="330" y1="197" x2="810" y2="197" />
    
    <line x1="365" y1="243" x2="745" y2="243" />
    <line x1="355" y1="257" x2="760" y2="257" />
    <line x1="325" y1="271" x2="785" y2="271" />
    
