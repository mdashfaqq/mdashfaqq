  <circle cx="36" cy="18" r="5.5" fill="#FEBC2E"/>
  <circle cx="52" cy="18" r="5.5" fill="#28C840"/>

  <!-- Path and active state -->
  <text x="450" y="22" font-family="'JetBrains Mono', monospace" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="0.04em">ashfaqdev ~ % profile.sh --live</text>
  
  <g transform="translate(832, 13)">
    <circle cx="5" cy="5" r="3" fill="#22c55e" style="filter: drop-shadow(0 0 3px #22c55e);"/>
    <text x="14" y="9" font-family="'JetBrains Mono', monospace" font-size="10" fill="#22c55e">active</text>
