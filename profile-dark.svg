<svg width="900" height="511" viewBox="0 0 900 511" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fonts and animations -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&amp;display=swap');
      
      .txt-base { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #cbd5e1; }
      .txt-header { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: bold; fill: #00D4FF; letter-spacing: 0.12em; }
      .txt-subheader { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #55657e; letter-spacing: 0.06em; }
      .txt-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #00D4FF; }
      .txt-label-sec { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #A855F7; }
      .txt-label-dev { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #3B82F6; }
      .txt-label-con { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #22C55E; }
      .txt-value { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #e2e8f0; }
      .txt-value-cyan { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #00FFCC; }
      .txt-value-dim { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #94a3b8; }
      
      .txt-divider { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #1c2333; letter-spacing: -0.02em; user-select: none; }
      .txt-footer { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #334155; letter-spacing: 0.08em; }
      
      @keyframes cursor-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor { animation: cursor-blink 1s step-end infinite; fill: #00D4FF; }
      
      @keyframes laser-sweep {
        0% { transform: translateY(36px); }
        50% { transform: translateY(502px); }
        100% { transform: translateY(36px); }
      }
      .laser-group { animation: laser-sweep 6s ease-in-out infinite; }
      
      @keyframes avatar-breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }
      .avatar-shape {
        transform-origin: 120px 200px;
        animation: avatar-breathe 4s ease-in-out infinite;
      }
    </style>

    <!-- Grid pattern for background -->
    <pattern id="grid" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="rgba(0, 212, 255, 0.025)" stroke-width="1"/>
    </pattern>

    <!-- Laser linear gradient -->
    <linearGradient id="laser-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0, 255, 204, 0)"/>
      <stop offset="50%" stop-color="rgba(0, 255, 204, 0.25)"/>
      <stop offset="100%" stop-color="rgba(0, 255, 204, 0)"/>
    </linearGradient>
  </defs>

  <!-- Outer Card Rect -->
  <rect x="0.5" y="0.5" width="899" height="510" rx="9.5" fill="#0f0f10" stroke="rgba(255, 255, 255, 0.08)"/>

  <!-- Left Column Background -->
  <path d="M10 36H240V501H10C4.47715 501 0 496.523 0 491V46C0 40.4772 4.47715 36 10 36Z" fill="#0c0c0e"/>
  <line x1="240" y1="36" x2="240" y2="501" stroke="rgba(255, 255, 255, 0.06)"/>

  <!-- Grid overlay in Left Column -->
  <rect x="0" y="36" width="240" height="465" fill="url(#grid)" />

  <!-- Title bar background -->
  <path d="M10 0H890C895.523 0 900 4.47715 900 10V36H0V10C0 4.47715 4.47715 0 10 0Z" fill="#1a1a1c"/>
