    <text x="620" y="246" class="txt-value" text-anchor="end">React • TypeScript</text>

    <text x="0" y="260" class="txt-label-dev"><tspan fill="rgba(255,255,255,0.15)">•</tspan> Core.Backend</text>
    <text x="620" y="260" class="txt-value" text-anchor="end">Node.js • Python</text>

    <text x="0" y="274" class="txt-label-dev"><tspan fill="rgba(255,255,255,0.15)">•</tspan> Core.Database</text>
