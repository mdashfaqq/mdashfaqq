  <text x="214" y="93" font-family="'JetBrains Mono', monospace" font-size="8" fill="rgba(0, 212, 255, 0.7)" text-anchor="end">SWEEP: 96%</text>
  
  <text x="26" y="443" font-family="'JetBrains Mono', monospace" font-size="8" fill="rgba(0, 212, 255, 0.7)">TARGET: M.ASHFAQ</text>
  <text x="214" y="443" font-family="'JetBrains Mono', monospace" font-size="8" fill="rgba(0, 212, 255, 0.7)" text-anchor="end">MATCH: 99.98%</text>

